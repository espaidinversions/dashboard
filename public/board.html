<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanvas Board</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:       #0f1923;
      --card:     #16232f;
      --border:   #253548;
      --text:     #d4e4f0;
      --text-mid: #7a9eb8;
      --text-dim: #4e6e88;

      --purple: #9b7cc8;
      --red:    #ef5350;
      --orange: #e8922a;
      --cyan:   #70b0dc;
      --green:  #5cc88a;
      --gray:   #4e6e88;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    #header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    #header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    #header h1 span { color: var(--green); }
    #last-refreshed { font-size: 11px; color: var(--text-dim); }
    #refresh-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-mid);
      padding: 5px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    #refresh-btn:hover { border-color: var(--green); color: var(--green); }

    /* Legend */
    #legend {
      display: flex;
      gap: 18px;
      padding: 9px 28px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-mid);
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    }

    /* Board */
    #board {
      display: flex;
      gap: 14px;
      padding: 20px 28px 48px;
      overflow-x: auto;
      align-items: flex-start;
    }

    /* Column */
    .column {
      flex: 0 0 260px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .column-header {
      padding: 10px 12px 8px;
      background: var(--card);
      border-radius: 8px;
      border: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .column-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-mid);
      margin-bottom: 6px;
    }
    .column-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .count-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      border-top-width: 3px;
      padding: 10px 12px;
    }
    .card.dimmed { opacity: 0.5; }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .card-id {
      font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 10px;
      color: var(--text-dim);
    }
    .card-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .card-desc {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .card-deps { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .dep-chip {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--border);
      color: var(--text-mid);
      font-family: 'DM Mono', 'Courier New', monospace;
    }
    .dep-chip.blocks { color: var(--orange); }
    .dep-chip.waiting { color: var(--gray); }

    /* Error banner */
    #error {
      margin: 20px 28px;
      padding: 12px 16px;
      background: #2a0f0f;
      border: 1px solid #ef5350;
      border-radius: 8px;
      color: #ef5350;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="header"></div>
  <div id="legend"></div>
  <div id="board"></div>
  <div id="error" style="display:none"></div>
  <script>
    const STATE_MAP = {
      "6": { name: "Proposed", color: "var(--purple)" },
      "1": { name: "To Do",    color: "var(--red)"    },
      "2": { name: "Active",   color: "var(--orange)" },
      "5": { name: "Review",   color: "var(--cyan)"   },
      "4": { name: "Done",     color: "var(--green)"  },
      "0": { name: "Blocked",  color: "var(--gray)"   },
    };
    const STATE_ORDER = ["2","1","6","5","0","4"];
    const DIMMED = new Set(["0","4"]);

    async function fetchBoard() {
      const res = await fetch("/api/board");
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // Step 1: Task node detection and parser
    const TASK_ID_RE = /^##\s+([A-Z]{1,4}-\d+)\s+(.*)/m;

    function isTaskNode(node) {
      return node.type === "text" && TASK_ID_RE.test(node.text || "");
    }

    function parseTaskNode(node) {
      const match = (node.text || "").match(TASK_ID_RE);
      const id    = match[1];
      const title = match[2].trim();
      const lines = node.text.split("\n");
      const descLines = lines.slice(1).map(l => l.trim()).filter(Boolean);
      const desc = descLines.join(" ").trim();
      return { id, title, desc };
    }

    // Step 2: State and group helpers
    function getState(node) {
      const code = node.color ?? "0";
      return STATE_MAP[code] ?? STATE_MAP["0"];
    }

    function getStateCode(node) {
      return node.color ?? "0";
    }

    function getGroupName(node, groups) {
      for (const g of groups) {
        if (
          node.x >= g.x &&
          node.x <= g.x + g.width &&
          node.y >= g.y &&
          node.y <= g.y + g.height
        ) return g.label || "Other";
      }
      return "Other";
    }

    // Step 3: Dependency builder
    function buildDeps(taskNodes, edges) {
      const nodeToTask = {};
      taskNodes.forEach(n => {
        const { id } = parseTaskNode(n);
        nodeToTask[n.id] = id;
      });

      const blocks = {}, waitingOn = {};
      taskNodes.forEach(n => {
        const { id } = parseTaskNode(n);
        blocks[id] = [];
        waitingOn[id] = [];
      });

      edges.forEach(e => {
        const from = nodeToTask[e.fromNode];
        const to   = nodeToTask[e.toNode];
        if (from && to) {
          blocks[from].push(to);
          waitingOn[to].push(from);
        }
      });

      return { blocks, waitingOn };
    }

    // Step 4: Card sorter
    function sortCards(cards) {
      return [...cards].sort((a, b) => {
        const ai = STATE_ORDER.indexOf(a.stateCode);
        const bi = STATE_ORDER.indexOf(b.stateCode);
        return ai - bi;
      });
    }

    // Step 5: parseCanvas
    function parseCanvas({ nodes, edges }) {
      const groups    = nodes.filter(n => n.type === "group");
      const taskNodes = nodes.filter(isTaskNode);
      const { blocks, waitingOn } = buildDeps(taskNodes, edges);

      const cards = taskNodes.map(n => {
        const { id, title, desc } = parseTaskNode(n);
        return {
          id,
          title,
          desc,
          stateCode: getStateCode(n),
          state:     getState(n),
          group:     getGroupName(n, groups),
          blocks:    blocks[id]    || [],
          waitingOn: waitingOn[id] || [],
        };
      });

      return { groups, cards };
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderBadge(state, extraClass = "card-badge") {
      return `<span class="${extraClass}" style="background:${state.color}22;color:${state.color}">${state.name}</span>`;
    }

    function renderDepChips(blocks, waitingOn) {
      if (!blocks.length && !waitingOn.length) return "";
      const chips = [
        ...blocks.map(id    => `<span class="dep-chip blocks">blocks ${esc(id)}</span>`),
        ...waitingOn.map(id => `<span class="dep-chip waiting">waiting on ${esc(id)}</span>`),
      ];
      return `<div class="card-deps">${chips.join("")}</div>`;
    }

    function renderCard(card) {
      const dimmed = DIMMED.has(card.stateCode) ? " dimmed" : "";
      return `
        <div class="card${dimmed}" style="border-top-color:${card.state.color}">
          <div class="card-top">
            <span class="card-id">${esc(card.id)}</span>
            ${renderBadge(card.state)}
          </div>
          <div class="card-title">${esc(card.title)}</div>
          ${card.desc ? `<div class="card-desc">${esc(card.desc)}</div>` : ""}
          ${renderDepChips(card.blocks, card.waitingOn)}
        </div>`;
    }

    function renderColumn(groupName, cards) {
      const sorted = sortCards(cards);

      const counts = {};
      cards.forEach(c => { counts[c.stateCode] = (counts[c.stateCode] || 0) + 1; });
      const countHtml = Object.entries(counts)
        .sort(([a],[b]) => STATE_ORDER.indexOf(a) - STATE_ORDER.indexOf(b))
        .map(([code, n]) => {
          const s = STATE_MAP[code] || STATE_MAP["0"];
          return `<span class="count-badge" style="background:${s.color}22;color:${s.color}">${n} ${s.name}</span>`;
        }).join("");

      return `
        <div class="column">
          <div class="column-header">
            <div class="column-title">${esc(groupName)}</div>
            <div class="column-badges">${countHtml}</div>
          </div>
          ${sorted.map(renderCard).join("")}
        </div>`;
    }

    function render(data) {
      const { groups, cards } = parseCanvas(data);

      const groupNames = [...new Set(groups.sort((a,b) => a.x - b.x).map(g => g.label || "Other"))];

      const byGroup = {};
      groupNames.forEach(g => { byGroup[g] = []; });
      cards.forEach(c => {
        if (!byGroup[c.group]) byGroup[c.group] = [];
        byGroup[c.group].push(c);
      });

      document.getElementById("board").innerHTML =
        groupNames.map(g => renderColumn(g, byGroup[g] || [])).join("");
    }

    function renderHeader(lastRefreshed) {
      document.getElementById("header").innerHTML = `
        <h1>Kanvas <span>Board</span></h1>
        <span id="last-refreshed">Refreshed ${lastRefreshed}</span>
        <button id="refresh-btn" onclick="loadAndRender()">↻ Refresh</button>`;
    }

    function renderLegend() {
      const items = [
        ["Proposed", "var(--purple)"],
        ["To Do",    "var(--red)"],
        ["Active",   "var(--orange)"],
        ["Review",   "var(--cyan)"],
        ["Done",     "var(--green)"],
        ["Blocked",  "var(--gray)"],
      ];
      document.getElementById("legend").innerHTML = items.map(([name, color]) =>
        `<div class="legend-item">
           <div class="legend-dot" style="background:${color}"></div>
           <span>${name}</span>
         </div>`
      ).join("");
    }

    async function loadAndRender() {
      const errEl = document.getElementById("error");
      try {
        const data = await fetchBoard();
        errEl.style.display = "none";
        render(data);
        renderHeader(new Date().toLocaleTimeString());
      } catch (e) {
        errEl.style.display = "block";
        errEl.textContent = `Failed to load board: ${e.message}`;
      }
    }

    renderLegend();
    loadAndRender();
    setInterval(loadAndRender, 30_000);
  </script>
</body>
</html>
